<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAFFICmind Dashboard</title>
    <link rel="icon" type="image/png" href="images/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg" />
    <link rel="shortcut icon" href="images/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="images/favicon/site.webmanifest" />
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/stats.css">
    <link rel="stylesheet" href="css/components/dashboard.css">
    <link rel="stylesheet" href="css/components/caching.css">
    <link rel="stylesheet" href="css/utils/responsive.css">
</head>

<body>
    <header>
        <div class="header">
            <a href="index.html">
                <img src="images/logo.svg" alt="trafficmind logo" loading="lazy" class="logo-btn" width="211" height="49">
            </a>

            <div class="profile-wrapper">
                <button class="icon-btn" type="button" id="profileBtn" aria-haspopup="menu" aria-expanded="false"
                    aria-controls="profileMenu" aria-label="Open profile menu" data-label-open="Open profile menu"
                    data-label-close="Close profile menu">
                    <img src="images/profile.svg" alt="Open profile menu" loading="lazy" width="21" height="21">
                </button>

                <div class="profile-menu dropdown dropdown--panel" id="profileMenu" role="menu"
                    aria-label="Profile menu">
                    <button class="dropdown__item" type="button" role="menuitem">Profile</button>
                    <button class="dropdown__item" type="button" role="menuitem">Settings</button>
                    <button class="dropdown__item" type="button" role="menuitem">Logout</button>
                </div>
            </div>
        </div>
        <div class="header-menu">
            <span>STATISTICS</span>

            <button class="menu-btn" id="menuBtn" type="button" aria-haspopup="menu" aria-expanded="false"
                aria-controls="menuDropdown" aria-label="Open main menu" data-label-open="Open main menu"
                data-label-close="Close main menu">
                <span class="menu-btn__line"></span>
                <span class="menu-btn__line"></span>
                <span class="menu-btn__line"></span>
            </button>

            <div class="menu-dropdown dropdown dropdown--panel" id="menuDropdown" role="menu" aria-label="Main menu">
                <button class="dropdown__item" type="button" role="menuitem">Dashboard</button>
                <button class="dropdown__item" type="button" role="menuitem">Analytics</button>
                <button class="dropdown__item" type="button" role="menuitem">Reports</button>
            </div>
        </div>
    </header>

    <main>
        <section class="traffic-stats">
            <div class="traffic-stats__card">
                <div class="traffic-stats__header">
                    <p class="traffic-stats__title">Requests</p>
                    <p class="traffic-stats__value">4.21M</p>
                </div>

                <div class="traffic-stats__chart">
                    <canvas id="requestsChart"></canvas>
                </div>
            </div>

            <div class="traffic-stats__card">
                <div class="traffic-stats__header">
                    <p class="traffic-stats__title">Data transfer</p>
                    <p class="traffic-stats__value">550.69 GB</p>
                </div>

                <div class="traffic-stats__chart">
                    <canvas id="transferChart"></canvas>
                </div>
            </div>
        </section>

        <section class="dashboard">
            <div class="dashboard__info-box">
                <img src="images/storage.svg" alt="storage" loading="lazy" width="64" height="64">
                <div class="dashboard__info">
                    <p class="dashboard__info-title">2 Storages</p>
                    <p class="dashboard__info-text">Total deleted storage: <span>0</span></p>
                </div>
            </div>

            <div class="dashboard__info-box">
                <img src="images/files.svg" alt="files" loading="lazy" width="64" height="64">
                <div class="dashboard__info">
                    <p class="dashboard__info-title">3 Total Files</p>
                    <p class="dashboard__info-text">Total deleted files: <span>25.25 KB</span></p>
                </div>
            </div>

            <div class="dashboard__info-box">
                <img src="images/file_cloud.svg" alt="files cloud" loading="lazy" width="64" height="64">
                <div class="dashboard__info">
                    <p class="dashboard__info-title">25.49 KB Files Size</p>
                    <p class="dashboard__info-text">25.49 KB last month</p>
                </div>
            </div>

            <div class="dashboard__info-box">
                <img src="images/refresh.svg" alt="refresh" loading="lazy" width="64" height="64">
                <div class="dashboard__info">
                    <p class="dashboard__info-title">0 Refresh Required</p>
                    <p class="dashboard__info-text-success">All synced</p>
                </div>
            </div>
        </section>

        <section class="caching">
            <div class="caching__top">
                <div class="caching__tabs-wrapper">
                    <div class="caching__tabs" id="cacheTabs">
                        <button class="caching__tab active" type="button" data-tab="served">Served by</button>
                        <button class="caching__tab" type="button" data-tab="cache-status">Cache status</button>
                        <button class="caching__tab" type="button" data-tab="country">Country</button>
                        <button class="caching__tab" type="button" data-tab="host">Host</button>
                    </div>

                    <div class="caching__more">
                        <button class="caching__more-btn" id="cacheMoreBtn" type="button" aria-haspopup="menu"
                            aria-expanded="false" aria-controls="cacheMoreMenu" aria-label="More cache tabs"
                            data-label-open="Open more cache tabs" data-label-close="Close more cache tabs">···</button>
                        <div class="cache-more-menu dropdown dropdown--compact" id="cacheMoreMenu" role="menu"
                            aria-label="More cache tabs">
                            <button class="dropdown__item" type="button" role="menuitem" data-tab="status-code">Status
                                Code</button>
                            <button class="dropdown__item" type="button" role="menuitem"
                                data-tab="device">Device</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="caching__panel" id="cachePanel">
                <div class="caching__stats-row">
                    <div class="caching__stat">
                        <p class="caching__stat-title">Total</p>
                        <p class="caching__stat-value" id="cacheTotalValue">0</p>
                    </div>

                    <div class="caching__stat">
                        <p class="caching__stat-title">
                            <span class="dot dot--lightblue"></span> Served by origin
                        </p>
                        <p class="caching__stat-value" id="cacheOriginValue">0</p>
                    </div>

                    <div class="caching__stat">
                        <p class="caching__stat-title">
                            <span class="dot dot--blue"></span> Served by Trafficmind
                        </p>
                        <p class="caching__stat-value" id="cacheTmValue">0</p>
                    </div>
                </div>

                <div class="caching__chart-box">
                    <canvas id="cachingChart"></canvas>
                </div>
            </div>
        </section>
    </main>
    <script defer src="js/configs.js"></script>
    <script defer src="js/charts.js"></script>
    <script defer src="js/script.js"></script>
</body>

</html>
